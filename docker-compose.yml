services:
  mysql:
    image: mysql:8.0
    container_name: pfm-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: project_finance
      MYSQL_USER: pfm_user
      MYSQL_PASSWORD: pfm_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: pfm-backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://pfm_user:pfm_password@mysql:3306/project_finance
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules

  frontend:
    build:
      context: ./frontend
    container_name: pfm-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - backend
    environment:
      VITE_PROXY_TARGET: http://backend:4000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  mysql_data:
  backend_node_modules:
  frontend_node_modules:
